<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация — Помогай</title>
    
<link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <h1>Регистрация</h1>
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="flash flash-{{ category }}">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}
        <form method="POST" id="regForm">
            <input type="text" name="honeypot" style="position:absolute;left:-9999px;top:-9999px;" tabindex="-1" autocomplete="off">
            <input type="hidden" name="form_time" id="formTime">
            <label>Номер телефона</label>
            <div class="phone-wrap">
                <span class="phone-prefix">+7</span>
                <input type="tel" name="phone" placeholder="" required>
            </div>
            <label>Пароль (минимум 6 символов)</label>
            <input type="password" name="password" placeholder="" required>
            <label>Повторите пароль</label>
            <input type="password" name="password2" placeholder="" required>
            <button type="submit">Зарегистрироваться</button>
        </form>
        <div class="link">Уже есть аккаунт? <a href="/login">Войти</a></div>
    </div>
<script>document.getElementById("formTime").value = Date.now()/1000;</script>
</body>
</html>
