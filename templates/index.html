<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>помогай.рф — платформа прямой помощи</title>
    <link rel="stylesheet" href="/static/style.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: #FDF8F5;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }
        .welcome { text-align: center; max-width: 420px; width: 100%; }

        .brand {
            font-size: 38px;
            font-weight: 700;
            color: white;
            margin-bottom: 12px;
            letter-spacing: -0.5px;
            border-radius: 16px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 14px 24px;
            line-height: 1;
            background: linear-gradient(160deg, #FF5A3C 0%, #FF7B5C 35%, #E85D75 100%);
            box-shadow: 0 2px 8px rgba(255,107,74,0.15);
            position: relative;
            overflow: hidden;
        }
        .brand::after {
            content: '';
            position: absolute;
            top: -30px;
            right: -30px;
            width: 80px;
            height: 80px;
            background: rgba(255,255,255,0.08);
            border-radius: 50%;
        }
        .brand::before {
            content: '';
            position: absolute;
            bottom: -15px;
            left: 15px;
            width: 40px;
            height: 40px;
            background: rgba(255,255,255,0.06);
            border-radius: 50%;
        }

        .context {
            font-size: 15px;
            color: #8C7A6B;
            line-height: 1.5;
            margin-bottom: 40px;
        }

        .features {
            display: flex;
            flex-direction: column;
            margin-bottom: 36px;
            text-align: left;
        }
        .feature {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 14px 0;
            font-size: 15px;
            color: #2D2D2D;
            border-bottom: 1px solid #F0EDEA;
        }
        .feature:last-child { border-bottom: none; }
        .feature svg { width: 20px; height: 20px; stroke: #8C7A6B; flex-shrink: 0; }

        .btn-goals {
            display: block;
            padding: 16px;
            background: linear-gradient(160deg, #FF5A3C 0%, #FF7B5C 35%, #E85D75 100%);
            color: white;
            border-radius: 14px;
            font-size: 17px;
            font-weight: 600;
            text-decoration: none;
            box-shadow: 0 2px 8px rgba(255,107,74,0.12);
            transition: transform 0.1s;
            margin-bottom: 32px;
            position: relative;
            overflow: hidden;
        }
        .btn-goals::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.25) 0%, transparent 60%);
            opacity: 0;
            transition: opacity 0.3s;
        }
        .btn-goals:active::after { opacity: 1; }
        .btn-goals:active { transform: scale(0.97); }

        .auth-section { display: flex; flex-direction: column; gap: 6px; }
        .auth-row { display: flex; gap: 10px; }
        .auth-btn {
            flex: 1;
            padding: 14px;
            border-radius: 14px;
            font-size: 14px;
            font-weight: 600;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: transform 0.1s;
        }
        .auth-btn:active { transform: scale(0.97); }
        .auth-outline { border: 1.5px solid #FF6B4A; background: white; color: #FF6B4A; }
        .auth-filled {
            background: linear-gradient(160deg, #FF5A3C 0%, #FF7B5C 35%, #E85D75 100%);
            color: white;
            border: none;
            box-shadow: 0 2px 8px rgba(255,107,74,0.12);
            position: relative;
            overflow: hidden;
        }
        .auth-filled::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.25) 0%, transparent 60%);
            opacity: 0;
            transition: opacity 0.3s;
        }
        .auth-filled:active::after { opacity: 1; }

        .divider {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 12px;
            color: #B0A8A0;
            margin: 4px 0;
        }
        .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: #E8E5E2; }
    </style>
</head>
<body>
    <div class="welcome">
        <div class="brand">помогай.рф</div>
        <p class="context">Платформа, где люди помогают людям напрямую. Без комиссий, без посредников.</p>

        <div class="features">
            <div class="feature">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                100% суммы доходит до получателя
            </div>
            <div class="feature">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
                Каждый перевод подтверждается получателем
            </div>
            <div class="feature">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
                Помогайте тем, что вам близко
            </div>
        </div>

        <a href="/goals" class="btn-goals">Смотреть цели</a>

        <div class="auth-section">
            <div class="auth-row">
                <a href="/login" class="auth-btn auth-outline">Вход</a>
                <a href="/register" class="auth-btn auth-filled">Регистрация</a>
            </div>
            <div class="divider">или через</div>
            <div class="auth-row">
                <a href="/auth/vk" class="auth-btn auth-outline">VK</a>
                <a href="/auth/max" class="auth-btn auth-outline">MAX</a>
            </div>
        </div>
    </div>
</body>
</html>
