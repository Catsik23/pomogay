<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>помогай.рф — платформа прямой помощи</title>
    <link rel="stylesheet" href="/static/style.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: #FDF8F5;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }
        .welcome {
            max-width: 420px;
            width: 100%;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 48px;
        }
        .top-logo {
            font-size: 26px;
            font-weight: 700;
            color: #FF8C69;
            border: 1.5px solid #FF8C69;
            border-radius: 12px;
            padding: 10px 18px;
        }
        .top-btns { display: flex; gap: 8px; align-items: stretch; }
        .top-divider {
            width: 1px;
            background: #E8E3E0;
            margin: 0 8px;
        }
        .btn-sm {
            padding: 8px 14px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            text-decoration: none;
            display: flex;
            align-items: center;
        }
        .btn-outline { border: 1px solid #FF8C69; color: #FF8C69; background: white; }
        .btn-filled { background: linear-gradient(135deg, #FF8C69 0%, #FF6B4A 100%); color: white; border: none; }

        .hero {
            text-align: center;
            margin-bottom: 40px;
        }
        .brand-plate {
            display: inline-block;
            border: 2px solid #FF8C69;
            border-radius: 16px 16px 0 0;
            border-bottom: 3px solid #FF8C69;
            padding: 14px 28px;
            margin-bottom: 6px;
        }
        .brand {
            font-size: 36px;
            font-weight: 700;
            color: #FF8C69;
            letter-spacing: -0.5px;
        }
        .context {
            font-size: 15px;
            color: #8C7A6B;
            line-height: 1.5;
            margin-top: 16px;
        }

        .features {
            display: flex;
            flex-direction: column;
            margin-bottom: 36px;
        }
        .feature {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 14px 0;
            font-size: 15px;
            color: #2D2D2D;
            border-bottom: 1px solid #F0EDEA;
        }
        .feature:last-child {
            border-bottom: none;
        }
        .feature svg {
            width: 20px;
            height: 20px;
            stroke: #8C7A6B;
            flex-shrink: 0;
        }

        .btn-goals {
            display: block;
            padding: 16px;
            background: linear-gradient(135deg, #FF8C69 0%, #FF6B4A 100%);
            color: white;
            border-radius: 14px;
            font-size: 17px;
            font-weight: 600;
            text-decoration: none;
            text-align: center;
            box-shadow: 0 4px 16px rgba(255,108,74,0.3);
            transition: transform 0.1s;
        }
        .btn-goals:active { transform: scale(0.97); }
    </style>
</head>
<body>
    <div class="welcome">
        <div class="top-bar">
            <div class="top-logo">помогай.рф</div>
            <div class="top-btns">
                <a href="/login" class="btn-sm btn-outline">Вход</a>
                <div class="top-divider"></div>
                <a href="/register" class="btn-sm btn-filled">Регистрация</a>
            </div>
        </div>

        <div class="hero">
            <div class="brand-plate">
                <div class="brand">помогай.рф</div>
            </div>
            <p class="context">Платформа, где люди помогают людям напрямую. Без комиссий, без посредников.</p>
        </div>

        <div class="features">
            <div class="feature">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                100% суммы доходит до получателя
            </div>
            <div class="feature">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
                Каждый перевод подтверждается получателем
            </div>
            <div class="feature">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
                Помогайте тем, что вам близко
            </div>
        </div>

        <a href="/goals" class="btn-goals">Смотреть цели</a>
    </div>
</body>
</html>
