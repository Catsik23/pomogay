<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>помогай.рф — платформа прямой помощи</title>
    <link rel="stylesheet" href="/static/style.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: #FDF8F5;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }
        .welcome {
            text-align: center;
            max-width: 420px;
            width: 100%;
        }

        .brand {
            font-size: 38px;
            font-weight: 700;
            color: #FF8C69;
            margin-bottom: 12px;
            letter-spacing: -0.5px;
            border: 2px solid #FF8C69;
            border-radius: 16px;
            display: inline-block;
            padding: 10px 24px;
        }
        .context {
            font-size: 15px;
            color: #8C7A6B;
            line-height: 1.5;
            margin-bottom: 40px;
        }

        .features {
            display: flex;
            flex-direction: column;
            margin-bottom: 36px;
            text-align: left;
        }
        .feature {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 14px 0;
            font-size: 15px;
            color: #2D2D2D;
            border-bottom: 1px solid #F0EDEA;
        }
        .feature:last-child { border-bottom: none; }
        .feature svg { width: 20px; height: 20px; stroke: #8C7A6B; flex-shrink: 0; }

        .btn-goals {
            display: block;
            padding: 16px;
            background: linear-gradient(135deg, #FF8C69 0%, #FF6B4A 100%);
            color: white;
            border-radius: 14px;
            font-size: 17px;
            font-weight: 600;
            text-decoration: none;
            box-shadow: 0 4px 16px rgba(255,108,74,0.3);
            transition: transform 0.1s;
            margin-bottom: 32px;
        }
        .btn-goals:active { transform: scale(0.97); }

        .auth-section {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .auth-row {
            display: flex;
            gap: 10px;
        }
        .auth-btn {
            flex: 1;
            padding: 14px;
            border-radius: 14px;
            font-size: 14px;
            font-weight: 600;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: transform 0.1s;
        }
        .auth-btn:active { transform: scale(0.97); }
        .auth-outline {
            border: 1px solid #E0E0E0;
            background: white;
            color: #2D2D2D;
        }
        .auth-filled {
            background: linear-gradient(135deg, #FF8C69 0%, #FF6B4A 100%);
            color: white;
            border: none;
        }
        .auth-icon {
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .auth-icon svg {
            width: 24px;
            height: 24px;
        }

        .divider {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 12px;
            color: #B0A8A0;
            margin: 8px 0;
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #E8E5E2;
        }
    </style>
</head>
<body>
    <div class="welcome">
        <div class="brand">помогай.рф</div>
        <p class="context">Платформа, где люди помогают людям напрямую. Без комиссий, без посредников.</p>

        <div class="features">
            <div class="feature">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                100% суммы доходит до получателя
            </div>
            <div class="feature">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
                Каждый перевод подтверждается получателем
            </div>
            <div class="feature">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
                Помогайте тем, что вам близко
            </div>
        </div>

        <a href="/goals" class="btn-goals">Смотреть цели</a>

        <div class="auth-section">
            <div class="auth-row">
                <a href="/login" class="auth-btn auth-outline">Вход</a>
                <a href="/register" class="auth-btn auth-filled">Регистрация</a>
            </div>
            <div class="divider">или через</div>
            <div class="auth-row">
                <a href="/auth/vk" class="auth-btn auth-outline">
                    <span class="auth-icon">
                        <svg viewBox="0 0 24 24" fill="#FF8C69"><path d="M22.4 5.9c-.2-.6-.8-.9-1.4-.9H3c-.6 0-1.2.3-1.4.9-.2.6 0 1.2.4 1.6l7.2 7.2c.4.4 1 .6 1.6.6h2.4c.6 0 1.2-.2 1.6-.6l7.2-7.2c.4-.4.6-1 .4-1.6z"/></svg>
                    </span>
                </a>
                <a href="/auth/max" class="auth-btn auth-outline">
                    <span class="auth-icon">
                        <svg viewBox="0 0 24 24" fill="#FF8C69"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2" stroke="white" stroke-width="2" fill="none"/></svg>
                    </span>
                </a>
            </div>
        </div>
    </div>
</body>
</html>
