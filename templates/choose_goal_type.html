<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Создать цель — Помогай</title>
    <link rel="stylesheet" href="/static/style.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: #FDF8F5;
        }
        .container {
            max-width: 480px;
            margin: 0 auto;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Верхняя часть с градиентом */
        .header-section {
            background: linear-gradient(135deg, #FFB39A 0%, #FF8C69 100%);
            padding: 32px 20px 20px 60px;
            color: white;
            border-radius: 0 0 24px 24px;
            flex-shrink: 0;
        }
        .header-section a {
            color: white;
            text-decoration: none;
            font-size: 14px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 20px;
        }
        .header-section h1 {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: -0.5px;
            line-height: 1.2;
        }
        .header-section p {
            font-size: 16px;
            font-weight: 300;
            opacity: 0.9;
            margin-top: 4px;
        }

        /* Кнопки — заполняют оставшееся место */
        .options-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 20px 16px;
            gap: 12px;
        }
        .option {
            flex: 1;
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 0 16px;
            border-radius: 16px;
            text-decoration: none;
            color: #2D2D2D;
            transition: transform 0.1s, opacity 0.15s;
            min-height: 0;
        }
        .option:active {
            transform: scale(0.98);
            opacity: 0.85;
        }
        .option-icon {
            width: 52px;
            height: 52px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        .option-green .option-icon { background: #E8F5E9; }
        .option-blue .option-icon { background: #E3F2FD; }
        .option-purple .option-icon { background: #F3E5F5; }
        .option-green { background: #F5FBF6; border: 1px solid #C8E6C9; }
        .option-blue { background: #F5F9FD; border: 1px solid #BBDEFB; }
        .option-purple { background: #FDF5FF; border: 1px solid #E1BEE7; }
        .option-title { font-size: 18px; font-weight: 600; }
        .option-desc { font-size: 13px; color: #8C7A6B; margin-top: 2px; }
        .option-meta { font-size: 12px; color: #8C7A6B; margin-top: 4px; display: flex; gap: 8px; }
        .option-meta span { background: rgba(0,0,0,0.04); padding: 2px 8px; border-radius: 6px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header-section">
            <a href="/goals">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
                Назад
            </a>
            <h1>Создать цель</h1>
            <p>Выберите тип сбора</p>
        </div>

        <div class="options-section">
            <a class="option option-green" href="/goals/new/super_blitz">
                <div class="option-icon">
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="#388E3C"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
                </div>
                <div>
                    <div class="option-title">Супер-блиц</div>
                    <div class="option-desc">Срочные небольшие нужды</div>
                    <div class="option-meta"><span>до 5 000 ₽</span><span>1 день</span><span>бесплатно</span></div>
                </div>
            </a>

            <a class="option option-blue" href="/goals/new/blitz">
                <div class="option-icon">
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="#1976D2"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="5" fill="white"/><circle cx="12" cy="12" r="2" fill="#1976D2"/></svg>
                </div>
                <div>
                    <div class="option-title">Блиц</div>
                    <div class="option-desc">Хотелки, курсы, техника</div>
                    <div class="option-meta"><span>500–50 000 ₽</span><span>1–7 дней</span><span>49–99 ₽</span></div>
                </div>
            </a>

            <a class="option option-purple" href="/goals/new/serious" onclick="alert('Серьёзные сборы — скоро'); return false;">
                <div class="option-icon">
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="#7B1FA2"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
                </div>
                <div>
                    <div class="option-title">Жизненные цели</div>
                    <div class="option-desc">Лечение, ипотека, важные расходы</div>
                    <div class="option-meta"><span>без лимита</span><span>долгий срок</span><span>99 ₽/нед</span></div>
                </div>
            </a>
        </div>
    </div>
</body>
</html>
