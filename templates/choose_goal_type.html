<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Создать цель — Помогай</title>
    <link rel="stylesheet" href="/static/style.css">
    <style>
        .container {
            max-width: 480px;
            margin: 0 auto;
            padding: 32px 20px;
        }
        .page-title {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 4px;
        }
        .page-subtitle {
            color: var(--text-soft);
            font-size: 15px;
            margin-bottom: 28px;
        }
        .option {
            display: block;
            padding: 20px 16px;
            border: 1px solid #e8e8e8;
            border-radius: 14px;
            margin-bottom: 10px;
            text-decoration: none;
            color: var(--text);
            transition: border-color 0.15s, background 0.15s;
        }
        .option:active {
            border-color: var(--cta);
            background: #FFF5F2;
        }
        .option-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 4px;
        }
        .option-desc {
            font-size: 14px;
            color: var(--text-soft);
            margin-bottom: 8px;
        }
        .option-meta {
            font-size: 13px;
            color: var(--text-soft);
            display: flex;
            gap: 12px;
        }
        .option-meta span {
            background: #f5f5f5;
            padding: 2px 8px;
            border-radius: 6px;
        }
        .back {
            margin-top: 24px;
            text-align: center;
            font-size: 15px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="page-title">Создать цель</h1>
        <p class="page-subtitle">Выберите тип сбора</p>

        <a class="option" href="/goals/new/super_blitz">
            <div class="option-title">Молниеносный сбор</div>
            <div class="option-desc">Срочные небольшие нужды</div>
            <div class="option-meta">
                <span>до 5 000 ₽</span>
                <span>1 день</span>
                <span>бесплатно</span>
            </div>
        </a>

        <a class="option" href="/goals/new/blitz">
            <div class="option-title">Быстрый сбор</div>
            <div class="option-desc">Хотелки, курсы, техника</div>
            <div class="option-meta">
                <span>500–50 000 ₽</span>
                <span>1–7 дней</span>
                <span>49–99 ₽</span>
            </div>
        </a>

        <a class="option" href="/goals/new/serious" onclick="alert('Серьёзные сборы — скоро'); return false;">
            <div class="option-title">Жизненная цель</div>
            <div class="option-desc">Лечение, ипотека, важные расходы</div>
            <div class="option-meta">
                <span>без лимита</span>
                <span>долгий срок</span>
                <span>99 ₽/нед</span>
            </div>
        </a>

        <div class="back">
            <a href="/goals">← К ленте целей</a>
        </div>
    </div>
</body>
</html>
