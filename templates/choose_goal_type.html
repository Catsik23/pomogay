<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Создать цель — Помогай</title>
    <link rel="stylesheet" href="/static/style.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: #FDF8F5;
        }
        .container {
            max-width: 480px;
            margin: 0 auto;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Шапка */
        .header-section {
            background: linear-gradient(160deg, #FF9A7C 0%, #FF6B4A 30%, #FF8C69 100%);
            padding: 20px 20px 24px;
            color: white;
            border-radius: 0 0 32px 32px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(255, 108, 74, 0.15);
        }
        .header-section::after {
            content: '';
            position: absolute;
            top: -30px;
            right: -20px;
            width: 100px;
            height: 100px;
            background: rgba(255,255,255,0.06);
            border-radius: 50%;
        }
        .back-link {
            position: absolute;
            left: 16px;
            top: 20px;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: rgba(255,255,255,0.8);
            text-decoration: none;
            border-radius: 10px;
        }
        .back-link:active { background: rgba(255,255,255,0.1); }
        .header-text {
            text-align: right;
            padding-right: 4px;
        }
        .header-text h1 {
            font-size: 24px;
            font-weight: 600;
            letter-spacing: -0.3px;
            line-height: 1.25;
            margin-bottom: 2px;
        }
        .header-text p {
            font-size: 14px;
            font-weight: 400;
            opacity: 0.85;
        }

        /* Кнопки */
        .options-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 24px 16px;
            gap: 14px;
        }
        .option {
            flex: 1;
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 0 18px;
            border-radius: 20px;
            text-decoration: none;
            color: #2D2D2D;
            transition: transform 0.15s, box-shadow 0.15s;
            background: white;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }
        .option:active {
            transform: scale(0.97);
            box-shadow: 0 1px 4px rgba(0,0,0,0.08);
        }
        .option-icon {
            width: 56px;
            height: 56px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        .option-green .option-icon { background: linear-gradient(135deg, #C8E6C9, #A5D6A7); }
        .option-blue .option-icon { background: linear-gradient(135deg, #BBDEFB, #90CAF9); }
        .option-purple .option-icon { background: linear-gradient(135deg, #E1BEE7, #CE93D8); }
        .option-title { font-size: 19px; font-weight: 700; letter-spacing: -0.2px; }
        .option-desc { font-size: 14px; color: #8C7A6B; margin-top: 3px; }
        .option-meta { font-size: 12px; color: #8C7A6B; margin-top: 5px; display: flex; gap: 8px; }
        .option-meta span { background: #F5F5F5; padding: 3px 10px; border-radius: 8px; font-weight: 500; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header-section">
            <a href="/goals" class="back-link">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
            </a>
            <div class="header-text">
                <h1>Создать цель</h1>
                <p>Выберите тип сбора</p>
            </div>
        </div>

        <div class="options-section">
            <a class="option option-green" href="/goals/new/super_blitz">
                <div class="option-icon">
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="#2E7D32"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
                </div>
                <div>
                    <div class="option-title">Супер-блиц</div>
                    <div class="option-desc">Срочные небольшие нужды</div>
                    <div class="option-meta"><span>до 5 000 ₽</span><span>1 день</span><span>бесплатно</span></div>
                </div>
            </a>

            <a class="option option-blue" href="/goals/new/blitz">
                <div class="option-icon">
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="#1565C0"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="5" fill="white"/><circle cx="12" cy="12" r="2" fill="#1565C0"/></svg>
                </div>
                <div>
                    <div class="option-title">Блиц</div>
                    <div class="option-desc">Хотелки, курсы, техника</div>
                    <div class="option-meta"><span>500–50 000 ₽</span><span>1–7 дней</span><span>49–99 ₽</span></div>
                </div>
            </a>

            <a class="option option-purple" href="/goals/new/serious" onclick="alert('Серьёзные сборы — скоро'); return false;">
                <div class="option-icon">
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="#6A1B9A"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
                </div>
                <div>
                    <div class="option-title">Жизненные цели</div>
                    <div class="option-desc">Лечение, ипотека, важные расходы</div>
                    <div class="option-meta"><span>без лимита</span><span>долгий срок</span><span>99 ₽/нед</span></div>
                </div>
            </a>
        </div>
    </div>
</body>
</html>
