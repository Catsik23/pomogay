<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Создать цель — Помогай</title>
    <link rel="stylesheet" href="/static/style.css">
    <style>
        .container {
            max-width: 480px;
            margin: 0 auto;
            padding: 20px 16px;
        }
        .header-card {
            background: linear-gradient(135deg, #FFF0EB 0%, #FFE0D6 100%);
            border-radius: 14px;
            padding: 20px 16px;
            text-align: center;
            margin-bottom: 24px;
            display: inline-block;
            width: auto;
            min-width: 200px;
        }
        .header-card h1 {
            font-size: 26px;
            font-weight: 700;
            margin: 0;
            line-height: 1.2;
        }
        .header-card p {
            font-size: 15px;
            color: #BF7A6A;
            margin: 2px 0 0;
        }
        .option {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 16px 14px;
            border-radius: 14px;
            margin-bottom: 10px;
            text-decoration: none;
            color: var(--text);
            transition: transform 0.1s, opacity 0.15s;
        }
        .option:active {
            transform: scale(0.98);
            opacity: 0.85;
        }
        .option-icon {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        .option-green .option-icon { background: #E8F5E9; color: #388E3C; }
        .option-blue .option-icon { background: #E3F2FD; color: #1976D2; }
        .option-purple .option-icon { background: #F3E5F5; color: #7B1FA2; }

        .option-green { background: #F5FBF6; border: 1px solid #C8E6C9; }
        .option-blue { background: #F5F9FD; border: 1px solid #BBDEFB; }
        .option-purple { background: #FDF5FF; border: 1px solid #E1BEE7; }

        .option-title { font-size: 17px; font-weight: 600; }
        .option-desc { font-size: 13px; color: var(--text-soft); margin-top: 2px; }
        .option-meta { font-size: 12px; color: var(--text-soft); margin-top: 4px; display: flex; gap: 8px; }
        .option-meta span { background: rgba(0,0,0,0.04); padding: 2px 8px; border-radius: 6px; }
        .back { margin-top: 20px; text-align: center; font-size: 15px; }
    </style>
</head>
<body>
    <div class="container">
        <div style="text-align:center;">
            <div class="header-card">
                <h1>Создать цель</h1>
                <p>Выберите тип сбора</p>
            </div>
        </div>

        <a class="option option-green" href="/goals/new/super_blitz">
            <div class="option-icon">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
            </div>
            <div>
                <div class="option-title">Молниеносный сбор</div>
                <div class="option-desc">Срочные небольшие нужды</div>
                <div class="option-meta"><span>до 5 000 ₽</span><span>1 день</span><span>бесплатно</span></div>
            </div>
        </a>

        <a class="option option-blue" href="/goals/new/blitz">
            <div class="option-icon">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>
            </div>
            <div>
                <div class="option-title">Быстрый сбор</div>
                <div class="option-desc">Хотелки, курсы, техника</div>
                <div class="option-meta"><span>500–50 000 ₽</span><span>1–7 дней</span><span>49–99 ₽</span></div>
            </div>
        </a>

        <a class="option option-purple" href="/goals/new/serious" onclick="alert('Серьёзные сборы — скоро'); return false;">
            <div class="option-icon">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
            </div>
            <div>
                <div class="option-title">Жизненная цель</div>
                <div class="option-desc">Лечение, ипотека, важные расходы</div>
                <div class="option-meta"><span>без лимита</span><span>долгий срок</span><span>99 ₽/нед</span></div>
            </div>
        </a>

        <div class="back">
            <a href="/goals">← К ленте целей</a>
        </div>
    </div>
</body>
</html>
