<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход — Помогай</title>
    
<link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <h1>Вход</h1>
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="flash flash-{{ category }}">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}
        <form method="POST" onsubmit="return false" id="loginForm">
            <label>Номер телефона</label>
            <div class="phone-wrap">
                <span class="phone-prefix">+7</span>
                <input type="tel" name="phone" placeholder="" required>
            <input type="text" style="display:none" aria-hidden="true">
            </div>
            <label>Пароль</label>
            <input type="password" name="password" placeholder="" required>
            <button type="button" onclick="document.getElementById('loginForm').submit()">Войти</button>
        </form>
        <div class="link">Ещё нет аккаунта? <a href="/register">Зарегистрироваться</a></div>
    </div>
</body>
</html>
